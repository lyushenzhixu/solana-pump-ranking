.phantom-rings {

  background: linear-gradient(135deg, rgba(153,69,255,0.2), rgba(26,10,46,0.9), rgba(20,241,149,0.1));
}

.explore-btn:hover ~ .btn-shadow {
  animation: shadowExplode 0.6s ease-out forwards;
}

@keyframes shadowExplode {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}

.explore-btn:active {
  transform: scale(0.95);
}

/* Scanning line on button */
.btn-scanline {
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  animation: scanBtn 4s ease-in-out infinite;
  pointer-events: none;
  border-radius: 60px;
}

@keyframes scanBtn {
  0% { left: -60%; }
  50% { left: 100%; }
  100% { left: 100%; }
}

/* Orbiting particles around button */
.orbit-particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  pointer-events: none;
}

.orbit-particle:nth-child(1) {
  background: var(--sol-purple);
  box-shadow: 0 0 10px var(--sol-purple);
  animation: orbit1 5s linear infinite;
}
.orbit-particle:nth-child(2) {
  background: var(--sol-green);
  box-shadow: 0 0 10px var(--sol-green);
  animation: orbit2 7s linear infinite;
}
.orbit-particle:nth-child(3) {
  background: var(--sol-blue);
  box-shadow: 0 0 8px var(--sol-blue);
  animation: orbit3 6s linear infinite reverse;
}

@keyframes orbit1 {
  0% { transform: rotate(0deg) translateX(140px) rotate(0deg); opacity: 0.8; }
  50% { opacity: 0.2; }
  100% { transform: rotate(360deg) translateX(140px) rotate(-360deg); opacity: 0.8; }
}
@keyframes orbit2 {
  0% { transform: rotate(120deg) translateX(160px) rotate(-120deg); opacity: 0.6; }
  50% { opacity: 0.15; }
  100% { transform: rotate(480deg) translateX(160px) rotate(-480deg); opacity: 0.6; }
}
@keyframes orbit3 {
  0% { transform: rotate(240deg) translateX(130px) rotate(-240deg); opacity: 0.7; }
  50% { opacity: 0.1; }
  100% { transform: rotate(600deg) translateX(130px) rotate(-600deg); opacity: 0.7; }
}

/* === SCANLINE OVERLAY === */
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 100;
  animation: scanShift 0.1s steps(2) infinite;
}

@keyframes scanShift {
  to { background-position: 0 4px; }
}

/* === CHROMATIC NOISE === */
.noise {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 99;
  mix-blend-mode: overlay;
  animation: noiseAnim 0.5s steps(4) infinite;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

@keyframes noiseAnim {
  0% { transform: translate(0,0); }
  25% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -1px); }
  75% { transform: translate(-1px, -2px); }
  100% { transform: translate(0,0); }
}

/* === VIGNETTE === */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 50;
}

/* === FLOATING MEME SHADOWS === */
.shadow-entity {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  mix-blend-mode: color-dodge;
  opacity: 0;
  pointer-events: none;
}

.shadow-entity:nth-child(1) {
  width: 200px; height: 200px;
  background: var(--sol-purple);
  left: 10%; top: 30%;
  animation: entityDrift 12s ease-in-out infinite;
}
.shadow-entity:nth-child(2) {
  width: 150px; height: 150px;
  background: var(--sol-green);
  right: 15%; top: 20%;
  animation: entityDrift 15s ease-in-out infinite 3s;
}
.shadow-entity:nth-child(3) {
  width: 180px; height: 180px;
  background: var(--warp-magenta);
  left: 30%; bottom: 15%;
  animation: entityDrift 10s ease-in-out infinite 6s;
}
.shadow-entity:nth-child(4) {
  width: 120px; height: 120px;
  background: var(--sol-blue);
  right: 25%; bottom: 25%;
  animation: entityDrift 18s ease-in-out infinite 2s;
}

@keyframes entityDrift {
  0%, 100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
  25% { opacity: 0.15; transform: translate(30px, -20px) scale(1); }
  50% { opacity: 0.08; transform: translate(-20px, 30px) scale(1.3); }
  75% { opacity: 0.12; transform: translate(10px, 10px) scale(0.8); }
}

/* === BOTTOM HINT === */
.bottom-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Exo 2', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(153,69,255,0.25);
  z-index: 10;
  animation: hintPulse 3s ease-in-out infinite;
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.15; transform: translateX(-50%) translateY(0); }
  50% { opacity: 0.4; transform: translateX(-50%) translateY(-5px); }
}

.bottom-hint .arrow {
  display: block;
  text-align: center;
  margin-bottom: 8px;
  font-size: 16px;
  animation: arrowBounce 2s ease-in-out infinite;
}

@keyframes arrowBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(5px); }
}

/* === GLITCH on hover === */
.explore-btn:hover .btn-text {
  animation: textGlitch 0.3s ease-in-out;
}

@keyframes textGlitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); text-shadow: 2px 0 var(--sol-green), -2px 0 var(--warp-magenta); }
  40% { transform: translate(2px, -1px); text-shadow: -2px 0 var(--sol-blue), 2px 0 var(--sol-purple); }
  60% { transform: translate(-1px, -2px); }
  80% { transform: translate(1px, 1px); text-shadow: 1px 0 var(--sol-green); }
  100% { transform: translate(0); text-shadow: none; }
}

.btn-text {
  position: relative;
  z-index: 2;
  display: inline-block;
}

/* ripple on click */
.ripple-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid var(--sol-purple);
  width: 10px; height: 10px;
  pointer-events: none;
  opacity: 0;
  z-index: 200;
}

.ripple-ring.active {

}

@keyframes rippleOut {

  100% { transform: translate(-50%, -50%) scale(40); opacity: 0; }
}

/* Portal effect behind button */
.portal {

}

@keyframes portalSpin {

}

/* Horizontal light streak */

<script>
const btn = document.getElementById('exploreBtn');
const ripple = document.getElementById('ripple');

btn.addEventListener('click', function(e) {
  const rect = btn.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  ripple.classList.remove('active');
  void ripple.offsetWidth;
  ripple.classList.add('active');
  
  // Flash effect
  btn.style.textShadow = '0 0 40px #fff, 0 0 80px var(--sol-purple), 0 0 120px var(--sol-green)';
  setTimeout(() => {
    btn.style.textShadow = '';
  }, 300);
  // 点击探索后进入榜单页
  setTimeout(() => {
    window.location.href = '/ranking';
  }, 500);
});

// Mouse parallax effect
document.addEventListener('mousemove', function(e) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  
  const nebula = document.querySelector('.nebula');
  if (nebula) {
    nebula.style.transform = `translate(${dx * 20}px, ${dy * 20}px)`;
  }
  
  const orb = document.querySelector('.distortion-orb');
  if (orb) {
    orb.style.transform = `translate(${dx * -15}px, ${dy * -15}px)`;
  }

  const content = document.querySelector('.center-content');
  if (content) {
    content.style.transform = `translate(${dx * 5}px, ${dy * 5}px)`;
  }

  const logos = document.querySelectorAll('.brand-logo');
  logos.forEach((logo, i) => {
    const speed = (i % 3 + 1) * 4;
    const dir = i % 2 === 0 ? 1 : -1;
    logo.style.setProperty('--px', `${dx * speed * dir}px`);
    logo.style.setProperty('--py', `${dy * speed * dir}px`);
  });
});
</script>
